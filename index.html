<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>测试页 - 先确认能跑通</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; background: #F5F3EE; color: #1A1815; }
  #log { white-space: pre-wrap; background: #fff; border-radius: 12px; padding: 16px; min-height: 200px; margin-bottom: 16px; line-height: 1.6; }
  input { width: 70%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
  button { padding: 10px 16px; border-radius: 8px; border: none; background: #1A1815; color: #fff; cursor: pointer; }
</style>
</head>
<body>
<h2>测试：能不能跟 Claude 说上话</h2>
<div id="log">还没发送任何消息。</div>
<input id="input" placeholder="说点什么..." />
<button onclick="send()">发送</button>

<script>
let history = [];

async function send() {
  const inputEl = document.getElementById('input');
  const logEl = document.getElementById('log');
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';

  history.push({ role: 'user', content: text });
  logEl.textContent += '\n\n我: ' + text + '\n小克: ';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    if (!res.ok) {
      const errData = await res.json();
      logEl.textContent += '[出错了: ' + JSON.stringify(errData) + ']';
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullReply = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      // Anthropic 流式返回是 SSE 格式，每行形如 "data: {...}"
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
      for (const line of lines) {
        try {
          const json = JSON.parse(line.slice(6));
          if (json.type === 'content_block_delta' && json.delta?.text) {
            fullReply += json.delta.text;
            logEl.textContent += json.delta.text;
          }
        } catch (e) { /* 忽略解析失败的行（比如 event: 这种） */ }
      }
    }

    history.push({ role: 'assistant', content: fullReply });
  } catch (e) {
    logEl.textContent += '[请求失败: ' + e.message + ']';
  }
}

document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>
